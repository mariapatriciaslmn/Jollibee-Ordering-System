<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In to Jollibee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Log In to Jollibee</h1> 
        <img src="https://1000logos.net/wp-content/uploads/2019/03/jollibee-logo-png.png" class="logo-inline" alt="Jollibee Logo" class="logo">

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p>Don't have an account?</p>
        <button class="link-btn" onclick="goToRegister()">Register</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
